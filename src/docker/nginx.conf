events {
    worker_connections 64;
}

http {
    # 限速：每个 IP 每分钟最多 60 次请求
    limit_req_zone $binary_remote_addr zone=arduino:10m rate=60r/m;

    upstream room_server {
        # room-server 映射到宿主机 127.0.0.1:8081（见 docker-compose.yml）
        # nginx 用 host 模式，可以直接访问宿主机 loopback
        server 127.0.0.1:8081;
    }

    server {
        listen 8080;             # Tailscale serve 代理到这里

        location ~ ^/(dates|slot|hotslots|refresh|status|newbook|b/.+)$ {
            limit_req zone=arduino burst=20 nodelay;

            proxy_pass         http://room_server;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 15s;
            proxy_connect_timeout 5s;
        }

        location / {
            return 404;
        }
    }
}
