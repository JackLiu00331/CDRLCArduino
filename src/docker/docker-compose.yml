services:

  # ── Python 数据服务 ────────────────────────────────────────────────────────
  # 绑定到 127.0.0.1:8081，仅 nginx 可访问
  room-server:
    build: .
    container_name: cdrlc-room-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"   # 宿主机 loopback:8081 → 容器:8080
    environment:
      - TZ=America/Chicago
    volumes:
      - ./schedule.json:/app/schedule.json:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/dates')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Nginx 反代 + 限速（监听宿主机 8080，Tailscale Funnel 从这里转发）────────
  nginx:
    image: nginx:alpine
    container_name: cdrlc-nginx
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - room-server
